<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none">
  <defs>
    <linearGradient id="g" x1="40" y1="20" x2="360" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD700"/>
      <stop offset="0.55" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#800020"/>
    </linearGradient>
    <linearGradient id="w" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F5F5"/>
      <stop offset="1" stop-color="#CFCFCF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g filter="url(#shadow)">
    <rect x="40" y="40" width="280" height="280" rx="72" fill="#0B0B0B"/>
    <rect x="40" y="40" width="280" height="280" rx="72" stroke="#232323" stroke-width="2"/>

    <rect x="171" y="115" width="22" height="150" rx="11" fill="url(#g)"/>
    <rect x="110" y="115" width="140" height="22" rx="11" fill="url(#g)"/>

    <path d="M126 193c0-30 24-54 54-54" stroke="url(#g)" stroke-width="14" stroke-linecap="round"/>
    <path d="M234 193c0-30-24-54-54-54" stroke="url(#g)" stroke-width="14" stroke-linecap="round"/>
    <path d="M144 204c0-19 16-35 36-35" stroke="#FFD700" stroke-opacity="0.85" stroke-width="10" stroke-linecap="round"/>
    <path d="M216 204c0-19-16-35-36-35" stroke="#FFD700" stroke-opacity="0.85" stroke-width="10" stroke-linecap="round"/>
    <circle cx="182" cy="270" r="12" fill="#FFD700"/>
  </g>

  <!-- Wordmark -->
  <g>
    <text x="380" y="185" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="120" font-weight="800" fill="url(#w)" letter-spacing="-2">
      TruConnect
    </text>
    <text x="386" y="242" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="34" font-weight="500" fill="#B0B0B0" letter-spacing="0.5">
      Precise Weighing
    </text>

    <!-- Accent underline -->
    <path d="M388 258h390" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
  </g>
