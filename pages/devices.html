<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruConnect - Devices</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #D4AF37;
      --primary-dark: #B8860B;
      --primary-light: #FFD700;
      --secondary: #800020;
      --bg: #121212;
      --darker: #0a0a0a;
      --card-bg: #1e1e1e;
      --text: #f5f5f5;
      --text-secondary: #b0b0b0;
      --border: #333;
      --success: #4CAF50;
      --danger: #f44336;
      --warning: #FFC107;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .page-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header h1 i { color: var(--primary); }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn-back {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-back:hover {
      background: rgba(255,255,255,0.1);
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .device-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      border-left: 4px solid var(--border);
      transition: all 0.2s ease;
    }

    .device-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .device-card.connected { border-left-color: var(--success); }
    .device-card.disconnected { border-left-color: var(--danger); }

    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .device-name {
      font-size: 1.1rem;
      font-weight: 500;
    }

    .device-type {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .device-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .device-status.online {
      background: rgba(76, 175, 80, 0.1);
      color: var(--success);
    }

    .device-status.offline {
      background: rgba(244, 67, 54, 0.1);
      color: var(--danger);
    }

    .device-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .device-details {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .device-details p {
      margin-bottom: 5px;
    }

    .device-details strong {
      color: var(--text);
    }

    .device-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .device-actions button {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .device-actions button:hover {
      background: rgba(212, 175, 55, 0.1);
      color: var(--primary);
      border-color: var(--primary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 4rem;
      color: var(--border);
      margin-bottom: 20px;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="page-header">
      <h1><i class="fas fa-microchip"></i> Device Management</h1>
      <div>
        <button class="btn btn-back" onclick="window.location.href='index.html'">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>
        <button class="btn btn-primary" id="btn-add-device">
          <i class="fas fa-plus"></i> Add Device
        </button>
      </div>
    </header>

    <div class="devices-grid" id="devices-list">
      <!-- Devices will be loaded here -->
    </div>

    <div class="empty-state" id="empty-state" style="display: none;">
      <i class="fas fa-plug"></i>
      <h3>No Devices Configured</h3>
      <p>Add your first device to start monitoring weights</p>
    </div>
  </div>

  <script>
    const api = window.electronAPI || {};

    // Sample device data (will be loaded from backend)
    let devices = [
      {
        id: 1,
        name: 'Scale Indicator 1',
        type: 'indicator',
        protocol: 'ZM',
        connection: 'Serial - COM3',
        status: 'offline'
      },
      {
        id: 2,
        name: 'RDU Display 1',
        type: 'rdu',
        protocol: 'Serial',
        connection: 'COM4 @ 1200 baud',
        status: 'offline'
      }
    ];

    function renderDevices() {
      const container = document.getElementById('devices-list');
      const emptyState = document.getElementById('empty-state');

      if (devices.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      container.style.display = 'grid';
      emptyState.style.display = 'none';

      container.innerHTML = devices.map(device => `
        <div class="device-card ${device.status}">
          <div class="device-header">
            <div>
              <div class="device-name">${device.name}</div>
              <div class="device-type">${device.type}</div>
            </div>
            <div class="device-status ${device.status === 'online' ? 'online' : 'offline'}">
              <span class="device-status-dot"></span>
              ${device.status === 'online' ? 'Online' : 'Offline'}
            </div>
          </div>
          <div class="device-details">
            <p><strong>Protocol:</strong> ${device.protocol}</p>
            <p><strong>Connection:</strong> ${device.connection}</p>
          </div>
          <div class="device-actions">
            <button onclick="testDevice(${device.id})">
              <i class="fas fa-sync"></i> Test
            </button>
            <button onclick="editDevice(${device.id})">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button onclick="deleteDevice(${device.id})">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    function testDevice(id) {
      console.log('Testing device:', id);
      alert('Testing device connection...');
    }

    function editDevice(id) {
      console.log('Editing device:', id);
      alert('Device editing coming soon');
    }

    function deleteDevice(id) {
      if (confirm('Are you sure you want to delete this device?')) {
        devices = devices.filter(d => d.id !== id);
        renderDevices();
      }
    }

    document.getElementById('btn-add-device').addEventListener('click', () => {
      alert('Add device dialog coming soon');
    });

    // Initialize
    renderDevices();
  </script>
</body>
</html>
