<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruConnect - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #D4AF37;
      --primary-dark: #B8860B;
      --bg: #121212;
      --darker: #0a0a0a;
      --card-bg: #1e1e1e;
      --text: #f5f5f5;
      --text-secondary: #b0b0b0;
      --border: #333;
      --success: #4CAF50;
      --danger: #f44336;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .page-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 30px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header h1 i { color: var(--primary); }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn-back {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-back:hover { background: rgba(255,255,255,0.1); }

    .btn-primary {
      background: var(--primary);
      color: #000;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .profile-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #000;
      font-weight: 700;
    }

    .profile-info h2 {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }

    .profile-info p {
      color: var(--text-secondary);
    }

    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
      background: rgba(212, 175, 55, 0.1);
      color: var(--primary);
      margin-top: 8px;
    }

    .form-section {
      margin-bottom: 30px;
    }

    .form-section h3 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-section h3 i {
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--darker);
      color: var(--text);
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-group input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle input {
      padding-right: 45px;
    }

    .password-toggle button {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .password-toggle button:hover {
      color: var(--primary);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.success {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .alert.error {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="page-header">
      <h1><i class="fas fa-user"></i> My Profile</h1>
      <button class="btn btn-back" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </button>
    </header>

    <div class="alert" id="alert"></div>

    <div class="profile-card">
      <div class="profile-header">
        <div class="avatar" id="avatar">A</div>
        <div class="profile-info">
          <h2 id="user-name">Admin User</h2>
          <p id="user-email">admin@truconnect.local</p>
          <span class="role-badge" id="user-role">Administrator</span>
        </div>
      </div>

      <form id="profile-form">
        <div class="form-section">
          <h3><i class="fas fa-user-edit"></i> Account Information</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" value="admin@truconnect.local" disabled>
            </div>
            <div class="form-group">
              <label>Role</label>
              <input type="text" id="role" value="Administrator" disabled>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3><i class="fas fa-lock"></i> Change Password</h3>
          <div class="form-group">
            <label>Current Password</label>
            <div class="password-toggle">
              <input type="password" id="current-password" placeholder="Enter current password">
              <button type="button" onclick="togglePassword('current-password', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>New Password</label>
              <div class="password-toggle">
                <input type="password" id="new-password" placeholder="Enter new password">
                <button type="button" onclick="togglePassword('new-password', this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <div class="password-toggle">
                <input type="password" id="confirm-password" placeholder="Confirm new password">
                <button type="button" onclick="togglePassword('confirm-password', this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-danger" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const api = window.electronAPI || {};

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');

      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert ${type}`;
      alert.style.display = 'block';

      setTimeout(() => {
        alert.style.display = 'none';
      }, 5000);
    }

    async function handleLogout() {
      try {
        if (api.logout) {
          await api.logout();
        }
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Logout error:', error);
        window.location.href = 'login.html';
      }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword || confirmPassword) {
        if (!currentPassword) {
          showAlert('Please enter your current password', 'error');
          return;
        }

        if (newPassword !== confirmPassword) {
          showAlert('New passwords do not match', 'error');
          return;
        }

        if (newPassword.length < 6) {
          showAlert('Password must be at least 6 characters', 'error');
          return;
        }
      }

      // TODO: Implement password change via IPC
      showAlert('Profile updated successfully', 'success');

      // Clear password fields
      document.getElementById('current-password').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('confirm-password').value = '';
    });

    // Load user data on page load
    async function loadUserData() {
      try {
        if (api.checkSession) {
          const session = await api.checkSession();
          if (session.user) {
            document.getElementById('user-name').textContent = session.user.name || 'User';
            document.getElementById('user-email').textContent = session.user.email || '';
            document.getElementById('email').value = session.user.email || '';
            document.getElementById('role').value = session.user.role || 'operator';
            document.getElementById('avatar').textContent = (session.user.email || 'U')[0].toUpperCase();

            const roleMap = { admin: 'Administrator', operator: 'Operator', viewer: 'Viewer' };
            document.getElementById('user-role').textContent = roleMap[session.user.role] || session.user.role;
          }
        }
      } catch (error) {
        console.error('Error loading user data:', error);
      }
    }

    loadUserData();
  </script>
</body>
</html>
