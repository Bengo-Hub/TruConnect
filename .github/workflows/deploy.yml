# TruConnect: build and release. Avoids loop by skipping when the triggering
# commit is the automated "chore(release): bump version" (that commit is created
# by the release script and would re-trigger the workflow).
name: Build and Release TruConnect

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    # Skip entire job on push when this run was triggered by our own bump commit (stops the loop)
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'push' && 
       !contains(github.event.head_commit.message, '[skip ci]') && 
       !contains(github.event.head_commit.message, 'chore(release)'))

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    # Only bump version on push from a human (or other) commit; never when already a bump commit
    - name: Run release script (automated versioning)
      if: |
        github.event_name == 'workflow_dispatch' || 
        (github.event_name == 'push' && 
         !contains(github.event.head_commit.message, '[skip ci]') && 
         !contains(github.event.head_commit.message, 'chore(release)'))
      shell: bash
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GIT_USER: "TruLoad Bot"
        GIT_EMAIL: "dev@truload.io"
      run: |
        chmod +x scripts/release.sh
        ./scripts/release.sh patch

    - name: Build/release Electron app
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: npm run build:publish
