name: Build and Release TruConnect

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run release script (automated versioning)
      if: "${{ github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(release): bump version') }}"
      shell: bash
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GIT_USER: "TruLoad Bot"
        GIT_EMAIL: "dev@truload.io"
      run: |
        chmod +x scripts/release.sh
        ./scripts/release.sh patch

    - name: Build/release Electron app
      if: "${{ !contains(github.event.head_commit.message, 'chore(release): bump version') }}"
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      # This will build and publish the release to GitHub
      run: npm run build:publish
